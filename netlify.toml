[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments — full build, no www redirect
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[[redirects]]
  from = "/static/*"
  to = "/studio/static/:splat"
  status = 200

# Redirect www to non-www
[[redirects]]
  from = "https://www.fathersheartbible.com/*"
  to = "https://fathersheartbible.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.fathersheartbible.org/*"
  to = "https://fathersheartbible.org/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com https://mail.spiritmediaone.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.sanity.io https://assets.spiritmediapublishing.com https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://rusi1hyi.api.sanity.io https://cdn.sanity.io https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; frame-src https://api.leadconnectorhq.com https://link.msgsndr.com https://*.gohighlevel.com https://mail.spiritmediaone.com; media-src 'self' https://assets.spiritmediapublishing.com; object-src 'none'; base-uri 'self'; form-action 'self'"
