      - paragraph [ref=e102]: Around the world, people are awakening to the reality that God is not only to be obeyed—He is also to be known as Father. Some are coming into this realization after decades of faithful Christianity. Others are receiving it early. Still others are just beginning to search for language around intimacy, identity, sonship, and the Father’s heart. The Father’s Heart Movement is a place for those people to gather, grow, pray, and participate.
